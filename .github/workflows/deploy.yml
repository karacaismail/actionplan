# CI + GitHub Pages dağıtımı.
#  - main'e PUSH: build (tüm kapılar) + deploy.
#  - main'e PR: yalnız build (kapılar doğrulanır) — deploy YOK. PR'ın "build" check'i merge için zorunludur.
# Gateler BLOKLAYICI: tip/lint/içerik/ruleset/surface/audit/veri-kalite/birim/E2E herhangi biri kırmızıysa merge ve deploy engellenir.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu çek
        uses: actions/checkout@v4

      - name: Node 20 kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bağımlılıkları kur
        run: npm install --no-audit --no-fund

      - name: Tip denetimi
        run: npm run typecheck

      # Lint kapısı (biome — BLOKLAYICI). Kod stili + statik a11y kuralları (JSX) + import düzeni.
      # CI ubuntu-x64'te npm install doğru biome ikilisini (cli-linux-x64) çözer.
      - name: Lint (biome)
        run: npm run lint

      # İçerik kalite kapısı (Faz F2 — BLOKLAYICI). Önce bağımlılıksız node checker (hızlı, rollup gerekmez),
      # sonra kanonik vitest testi. 422 düğümün hiçbiri şablona (kalıp imzası/çapraz-tekrar) geri dönerse deploy durur.
      - name: İçerik kalite kapısı (node checker — 422 düğüm)
        run: node tools/agents/check-content.mjs

      - name: İçerik kalite kapısı (vitest — kanonik)
        run: npm run test:content

      # ECA ruleset paket kataloğu kapısı (Küme C — BLOKLAYICI). Katalog şema/güvenlik kurallarını
      # (system katmanı AI-değiştirilemez, maxChainDepth ≤6, layer/category geçerli) zorlar.
      - name: ECA ruleset kataloğu kapısı
        run: node tools/agents/check-ruleset.mjs

      # Surface/Workflow sözleşme kataloğu kapısı (Küme D — BLOKLAYICI). Durum makinesi tutarlılığı
      # (initial/terminal/transition states) + Workflow→ECA paketi çapraz-referans bütünlüğünü zorlar.
      - name: Surface/Workflow kataloğu kapısı
        run: node tools/agents/check-surface.mjs

      # Tech-profile kapısı (ADR-0026 — BLOKLAYICI). Frontend stack manifesti headless KİLİT (her
      # profil headless), stillenmiş kit + framework global yasağı (antd/MUI/Chakra/Mantine/Flowbite/
      # Next/Redux), package.json + kaynak import taraması, surface techProfileRef referans bütünlüğü.
      - name: Tech-profile kapısı (headless kilit + yasak-lib + techProfileRef)
        run: node tools/agents/check-tech-profile.mjs

      # Mühendislik standardı işletim kapıları (ADR-0027 — hepsi BLOKLAYICI). standardRefs referans
      # bütünlüğü, boyut N/A gerekçesi, waiver yaşam döngüsü, kısa-kod tavanı, bağımlılık politikası,
      # UI standartları (emoji/styled-kit yok). Standartlar tavsiye değil, kapı.
      - name: Standart kapsamı kapısı (standardRefs referans bütünlüğü)
        run: node tools/agents/check-standards-coverage.mjs

      - name: Boyut uygulanabilirliği kapısı (applies=false ⇒ gerekçe)
        run: node tools/agents/check-dimension-applicability.mjs

      - name: Waiver yaşam döngüsü kapısı (gerekçe + onay + süre)
        run: node tools/agents/check-waivers.mjs

      - name: Kısa-kod kapısı (dosya satır tavanı)
        run: node tools/agents/check-short-code.mjs

      - name: Bağımlılık politikası kapısı (yasak paket + güvensiz sürüm)
        run: node tools/agents/check-dependency-policy.mjs

      - name: UI standartları kapısı (emoji/styled-kit yok)
        run: node tools/agents/check-ui-standards.mjs

      # i18n/l10n kapısı (ADR-0027 / 15. standart — BLOKLAYICI). i18n-standards.json sözleşmesi
      # (yedi must kuralı + banned/allowed primitifleri), i18nRef referans bütünlüğü ("i18n-standards"),
      # i18n-text alanlarının locale beyanı + çeviri anahtarı formatı. Surface i18n alanı uyarı (ratchet).
      - name: i18n kapısı (locale beyanı + i18nRef bütünlüğü + çeviri anahtarı)
        run: node tools/agents/check-i18n.mjs

      # Kernel sözleşme paketi kapısı (core-contract-pack §2 — BLOKLAYICI). Beş zorunlu primitifin
      # (tenant/authz/audit/observability/module-sdk) sözleşme-referansı: §2.x başlık çıpası + arayüz
      # imzası (backend paket yolu) + API referansı. "Adı geçiyor ama tanımlı değil" driftini bloklar.
      - name: Kernel sözleşme kapısı (core-contract §2 primitif referansları)
        run: node tools/agents/check-core-contract.mjs

      # Denetim/kalite kapısı (audit golden + köken iddiası — BLOKLAYICI). Golden düğümler
      # (product/customer/s-crm) ≥2.3 ve 14 boyut dolu kalmalı; "human/swarm" köken iddialı
      # düğümler eşik (2.0) altına düşemez. Skorlama uygulama-içi denetim görünümüyle ortak.
      - name: Kalite kapısı (audit — golden + köken)
        run: node tools/quality-lint.mjs

      # Veri kalite kapısı (Faz P3 — BLOKLAYICI). owner %100 dolu + geçerli ekip (people.json),
      # dependsOn/blocks/related referans bütünlüğü (dangling yok), dependsOn grafiği DAG (döngü yok).
      - name: Veri kalite kapısı (owner + referans bütünlüğü + DAG)
        run: node tools/agents/check-data-quality.mjs

      # Yürütme hazırlığı kapısı (Faz P5+ — BLOKLAYICI). done=kanıtlı (evidence+verification),
      # dev+ fazdaki düğüm yürütülebilir (owner+refs+schedule+AC), platform izlenebilir (traceability).
      - name: Yürütme hazırlığı kapısı (done-evidence + execution-readiness + platform-traceability)
        run: node tools/agents/check-execution-readiness.mjs

      # Definition of Ready kapısı (DX — BLOKLAYICI). development fazındaki düğüm repoPath+testCommand+implementationStatus taşımalı.
      - name: Definition of Ready kapısı (ready-for-dev)
        run: node tools/agents/check-ready-for-dev.mjs

      # Scale-invariant kapısı (ADR-K3 / SCV — BLOKLAYICI). Para/sipariş/stok yazan (financial|order|
      # inventory etiketli) mutasyon sözleşmesi outbox+idempotency zarfını beyan etmeden merge edilemez;
      # koruma zarfı sözleşme düğümleri mevcut olmalı. Plan katmanında beyan-tabanlı (kod-seviyesi platform repo).
      - name: Scale-invariant kapısı (etiketli mutasyon → outbox+idempotency beyanı)
        run: node tools/agents/check-scale-invariant.mjs

      # Atomik tip + Fragment + execution-contract yapı bütünlüğü kapıları (BLOKLAYICI).
      - name: Atomik tip katmanı kapısı (FieldTypeSchema atomları + yönergeler + düğüm referansı)
        run: node tools/agents/check-atomic-types.mjs

      - name: Fragment kademesi kapısı (FragmentSchema canonical/storage/crossFieldRules + yönerge)
        run: node tools/agents/check-fragments.mjs

      - name: Execution-contract kapısı (7 yönerge + ADR-A5 storage kilidi)
        run: node tools/agents/check-execution-contract.mjs

      - name: Birim testleri
        run: npm test

      # E2E + erişilebilirlik (axe WCAG 2.2). Dev-server tabanlı (build gerekmez).
      - name: E2E + axe
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e

      - name: Üretim derlemesi
        env:
          BASE_PATH: /actionplan/
        run: npm run build

      # Pages adımları yalnız gerçek dağıtımda (push); PR'da kapılar doğrulanır ama deploy ETMEZ.
      - name: Pages yapılandırması
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Pages artefaktını yükle
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages'e dağıt
        id: deployment
        uses: actions/deploy-pages@v4
