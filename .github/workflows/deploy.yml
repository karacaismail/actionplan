# GitHub Pages dağıtım iş akışı — main'e push veya elle tetikleme ile çalışır.
# Sıra: kur → tipdenetimi → içerik kalite kapısı → birim test → E2E/axe (dev-server) → Vite üretim derlemesi → deploy.
# Gateler BLOKLAYICI: tipdenetimi, içerik kapısı, birim test veya E2E/axe kırmızıysa deploy yapılmaz.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu çek
        uses: actions/checkout@v4

      - name: Node 20 kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bağımlılıkları kur
        run: npm install --no-audit --no-fund

      - name: Tip denetimi
        run: npm run typecheck

      # Lint kapısı (biome — BLOKLAYICI). Kod stili + statik a11y kuralları (JSX) + import düzeni.
      # CI ubuntu-x64'te npm install doğru biome ikilisini (cli-linux-x64) çözer.
      - name: Lint (biome)
        run: npm run lint

      # İçerik kalite kapısı (Faz F2 — BLOKLAYICI). Önce bağımlılıksız node checker (hızlı, rollup gerekmez),
      # sonra kanonik vitest testi. 422 düğümün hiçbiri şablona (kalıp imzası/çapraz-tekrar) geri dönerse deploy durur.
      - name: İçerik kalite kapısı (node checker — 422 düğüm)
        run: node tools/agents/check-content.mjs

      - name: İçerik kalite kapısı (vitest — kanonik)
        run: npm run test:content

      # ECA ruleset paket kataloğu kapısı (Küme C — BLOKLAYICI). Katalog şema/güvenlik kurallarını
      # (system katmanı AI-değiştirilemez, maxChainDepth ≤6, layer/category geçerli) zorlar.
      - name: ECA ruleset kataloğu kapısı
        run: node tools/agents/check-ruleset.mjs

      # Surface/Workflow sözleşme kataloğu kapısı (Küme D — BLOKLAYICI). Durum makinesi tutarlılığı
      # (initial/terminal/transition states) + Workflow→ECA paketi çapraz-referans bütünlüğünü zorlar.
      - name: Surface/Workflow kataloğu kapısı
        run: node tools/agents/check-surface.mjs

      # Denetim/kalite kapısı (audit golden + köken iddiası — BLOKLAYICI). Golden düğümler
      # (product/customer/s-crm) ≥2.3 ve 14 boyut dolu kalmalı; "human/swarm" köken iddialı
      # düğümler eşik (2.0) altına düşemez. Skorlama uygulama-içi denetim görünümüyle ortak.
      - name: Kalite kapısı (audit — golden + köken)
        run: node tools/quality-lint.mjs

      - name: Birim testleri
        run: npm test

      # E2E + erişilebilirlik (axe WCAG 2.2). Dev-server tabanlı (build gerekmez).
      - name: E2E + axe
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e

      - name: Üretim derlemesi
        env:
          BASE_PATH: /actionplan/
        run: npm run build

      - name: Pages yapılandırması
        uses: actions/configure-pages@v5

      - name: Pages artefaktını yükle
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages'e dağıt
        id: deployment
        uses: actions/deploy-pages@v4
