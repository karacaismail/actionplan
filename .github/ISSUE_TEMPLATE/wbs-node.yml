name: Yeni WBS dugumu onerisi
description: src/data/ agacina yeni bir TaskNode eklenmesi veya mevcut dugumun duzenlenmesi
labels: ["type:wbs-node", "area:data"]
body:
  - type: input
    id: title
    attributes:
      label: "Dugum basligi"
    validations:
      required: true
  - type: dropdown
    id: level
    attributes:
      label: "WBS seviyesi"
      options:
        - "app (dag)"
        - "module (kaya)"
        - "archetype (buyuk tas)"
        - "stone (orta tas)"
        - "molecule (kucuk tas)"
        - "element (toz tanesi)"
        - "atom"
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: "Baslangic faziyla iliskisi"
      options:
        - "requirements"
        - "test-plan"
        - "db-schema"
        - "development"
        - "test-qa"
        - "verification"
        - "release-maintenance"
  - type: dropdown
    id: priority
    attributes:
      label: "Oneri onceligi"
      options:
        - "low"
        - "medium"
        - "high"
        - "critical"
  - type: textarea
    id: rationale
    attributes:
      label: "Neden eklenmeli? (roadmap/enterprise uyumu)"
    validations:
      required: true
  - type: textarea
    id: dimensions
    attributes:
      label: "Hangi 14 boyut etkilenecek?"
      placeholder: "featureDefs, security, wcag ... (bos birakabilirsiniz)"
  - type: checkboxes
    id: quality_gate
    attributes:
      label: "Icerik kalite on kontrolu (onerici doldurur)"
      options:
        - label: "Kalip imzasi icermiyor (orijinal icerik)"
        - label: "Capraz-tekrar yok"
        - label: "Audit skoru >= 2.0 bekleniyor"
