name: Hata bildirimi
description: Bozuk davranis veya beklenmedik sonuc icin
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "Ozet"
      description: "Ne bozuk?"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Yeniden uretme adimlari"
      placeholder: "1. ... 2. ... 3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Beklenen davranis"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Gercek davranis"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: "Ortam (tarayici, OS, node surumu)"
  - type: textarea
    id: logs
    attributes:
      label: "Konsol ciktisi / ekran goruntusu (opsiyonel)"
