name: Standart önerisi / sapma (ADR-0027)
description: Mühendislik standardı ekle/değiştir veya bir sapma (waiver) / boyut N/A talep et
title: "[standard] "
labels: ["standard", "governance"]
body:
  - type: markdown
    attributes:
      value: |
        Standartlar tek-kaynak sözleşmedir (`src/data/standards/<id>.json`); düğüme **referans** verilir, yeniden yazılmaz. Bkz. `docs/engineering-standards-index.md`.
  - type: dropdown
    id: kind
    attributes:
      label: Tür
      options:
        - Yeni standart
        - Standart değişikliği
        - Waiver (sapma) talebi
        - Boyut uygulanabilirliği (N/A)
    validations:
      required: true
  - type: input
    id: standard-id
    attributes:
      label: İlgili standart id
      description: "src/data/standards/<id>.json (ör. coding-standards, design-system)"
  - type: textarea
    id: rationale
    attributes:
      label: Gerekçe
      description: Neden gerekli? Hangi boşluğu kapatır veya neden sapılıyor?
    validations:
      required: true
  - type: textarea
    id: rule
    attributes:
      label: Kural(lar)
      description: "Somut + ölçülebilir + zorlanabilir kural(lar); her biri severity (must/should/may) + check (nasıl zorlanır)."
  - type: input
    id: ci-gate
    attributes:
      label: Hangi CI kapısı zorlar?
      description: "check-standards-coverage / check-short-code / check-ui-standards / check-dependency-policy ..."
  - type: checkboxes
    id: ack
    attributes:
      label: Onay
      options:
        - label: Standardı içerik olarak düğüme yazmıyorum; standardRefs ile referans veriyorum
          required: true
        - label: ADR-0027 ile tutarlı
          required: true
